<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>जय माता दी - नवरात्रि शुभकामनाएँ</title>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Hindi:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle, #ff9933, #cc0000);
            font-family: 'Anek Hindi', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #fireworks-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .main-container {
            width: 95%;
            max-width: 500px;
            z-index: 10;
            padding: 10px;
            text-align: center;
        }

        .ad-container {
            margin: 10px 0;
            display: flex;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }

        /* कार्ड का मुख्य डिजाइन */
        .card {
            background: #fffbe6;
            border: 8px ridge #ffd700;
            border-radius: 20px;
            padding: 20px;
            padding-bottom: 60px; /* नीचे फोटो के लिए जगह */
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            display: none;
            position: relative;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .mata-img {
            width: 100%;
            border-radius: 10px;
            border: 3px solid #ff4500;
        }

        .from-name-top {
            font-size: 20px;
            color: #d41414;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .shayari {
            font-size: 18px;
            color: #b30000;
            line-height: 1.4;
            margin: 15px 0;
            font-weight: bold;
        }

        /* भेजने वाले की फोटो - निचले कोने में */
        .sender-photo-frame {
            position: absolute;
            bottom: 10px;
            right: 15px;
            text-align: center;
        }

        .sender-img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #ff4500;
            object-fit: cover;
            background: #eee;
        }

        .sender-name-tag {
            font-size: 12px;
            background: #ff4500;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            display: block;
            margin-top: -10px;
            position: relative;
            z-index: 2;
        }

        /* इनपुट बॉक्स */
        .setup-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); margin-top: 20px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ff9933; border-radius: 8px; }
        
        .btn { background: linear-gradient(#ff4500, #b30000); color: white; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%; margin-top: 10px; }
        .whatsapp-btn { background: #25D366; margin-top: 20px; text-decoration: none; display: block; color: white; padding: 12px; border-radius: 50px; font-weight: bold;}
        
        #openBtn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; background: gold; color: red; font-size: 22px; padding: 20px; border-radius: 10px; border: 4px solid red; cursor: pointer; font-weight: bold; box-shadow: 0 0 15px white; }
    </style>
</head>
<body>

    <canvas id="fireworks-canvas"></canvas>

    <!-- माता जी का गाना -->
    <audio id="bhajan" loop>
        <source src="mata_bhajan.mp3" type="audio/mpeg">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="main-container">

        <!-- 1. सबसे ऊपर विज्ञापन -->
        <div class="ad-container">
            <script type="text/javascript">
                atOptions = { 'key' : '5ef61b9ce5db99a105f2eab3538cf716', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} };
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/5ef61b9ce5db99a105f2eab3538cf716/invoke.js"></script>
        </div>

        <!-- एंट्री बटन (जब कोई लिंक खोलेगा) -->
        <button id="openBtn" onclick="startApp()">👉 माता रानी का आशीर्वाद लें</button>

        <!-- सेटअप बॉक्स (कार्ड बनाने के लिए) -->
        <div id="setupBox" class="setup-box" style="display: none;">
            <h2 style="color: #d41414;">अपना नवरात्रि कार्ड बनायें</h2>
            <input type="text" id="senderName" placeholder="अपना नाम यहाँ लिखें">
            <p style="font-size: 14px; text-align: left; color: #666; margin-left: 5px;">अपनी फोटो चुनें:</p>
            <input type="file" id="senderPhotoInput" accept="image/*">
            <button class="btn" onclick="generateAndShow()">कार्ड देखें ✨</button>
        </div>

        <!-- मुख्य ग्रीटिंग कार्ड -->
        <div id="wishCard" class="card">
            
            <div class="from-name-top">🚩 <span id="viewFrom"></span> की ओर से...</div>

            <!-- माता रानी की फोटो -->
            <img src="mata.gif" alt="Jai Mata Di" class="mata-img" onerror="this.src='https://media.giphy.com/media/3o7TKVUn7iM8FMEU24/giphy.gif'">

            <!-- 2. माता की फोटो के नीचे विज्ञापन -->
            <div class="ad-container">
                <script type="text/javascript">
                    atOptions = { 'key' : '5ef61b9ce5db99a105f2eab3538cf716', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} };
                </script>
                <script type="text/javascript" src="https://www.highperformanceformat.com/5ef61b9ce5db99a105f2eab3538cf716/invoke.js"></script>
            </div>

            <h1 style="color: #ff4500; margin: 10px 0;">शुभ नवरात्रि</h1>
            <p class="shayari">
                "माँ दुर्गा का वास हो,<br>
                दुखों का नाश हो,<br>
                हर घर में सुख-शान्ति का वास हो।"
            </p>

            <!-- भेजने वाले की फोटो फ्रेम (कोने में) -->
            <div class="sender-photo-frame">
                <img src="" id="viewPhoto" class="sender-img" style="display: none;">
                <span class="sender-name-tag" id="viewNameTag"></span>
            </div>

            <a href="#" id="waShare" class="whatsapp-btn" onclick="shareWhatsApp()">व्हाट्सएप पर भेजें 📱</a>
            
            <p onclick="location.href=location.pathname" style="margin-top:25px; cursor:pointer; font-size:13px; color:#d41414; font-weight:bold; text-decoration: underline;">अपना कार्ड खुद बनायें 🛠️</p>
        </div>

        <!-- 3. सबसे नीचे विज्ञापन -->
        <div class="ad-container">
            <script type="text/javascript">
                atOptions = { 'key' : '5ef61b9ce5db99a105f2eab3538cf716', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} };
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/5ef61b9ce5db99a105f2eab3538cf716/invoke.js"></script>
        </div>

    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const urlFrom = params.get('from');

        // अगर लिंक में नाम नहीं है (मतलब नया यूजर है)
        if(!urlFrom) {
            document.getElementById('openBtn').style.display = 'none';
            document.getElementById('setupBox').style.display = 'block';
        }

        function startApp() {
            document.getElementById('openBtn').style.display = 'none';
            document.getElementById('bhajan').play();
            if(urlFrom) {
                document.getElementById('viewFrom').innerText = urlFrom;
                document.getElementById('viewNameTag').innerText = urlFrom;
                document.getElementById('wishCard').style.display = 'block';
                startFireworks();
            }
        }

        function generateAndShow() {
            const name = document.getElementById('senderName').value;
            const photoFile = document.getElementById('senderPhotoInput').files[0];
            
            if(!name) { alert("कृपया अपना नाम लिखें!"); return; }

            document.getElementById('viewFrom').innerText = name;
            document.getElementById('viewNameTag').innerText = name;

            if (photoFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgElement = document.getElementById('viewPhoto');
                    imgElement.src = e.target.result;
                    imgElement.style.display = 'block';
                }
                reader.readAsDataURL(photoFile);
            }

            document.getElementById('setupBox').style.display = 'none';
            document.getElementById('wishCard').style.display = 'block';
            document.getElementById('bhajan').play();
            startFireworks();
        }

        function shareWhatsApp() {
            const name = document.getElementById('viewFrom').innerText;
            const shareUrl = `${window.location.origin}${window.location.pathname}?from=${encodeURIComponent(name)}`;
            const msg = `🚩 *शुभ नवरात्रि* 🚩\n\n*${name}* ने आपके लिए एक बहुत ही सुंदर माता रानी का सरप्राइज भेजा है।\n\nजल्दी से यहाँ क्लिक करके देखें 👇\n${shareUrl}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // Fireworks Function
        function startFireworks() {
            const canvas = document.getElementById('fireworks-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particles = [];
            function Particle(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.vx = Math.random() * 4 - 2; this.vy = Math.random() * 4 - 2; this.alpha = 1;
            }
            Particle.prototype.draw = function() {
                ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill();
                this.x += this.vx; this.y += this.vy; this.alpha -= 0.01;
            }
            function animate() {
                ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width, canvas.height);
                if(Math.random() < 0.05) {
                    let x = Math.random()*canvas.width, y = Math.random()*canvas.height;
                    let color = `hsl(${Math.random()*360}, 100%, 50%)`;
                    for(let i=0; i<15; i++) particles.push(new Particle(x,y,color));
                }
                particles.forEach((p,i) => { p.draw(); if(p.alpha<=0) particles.splice(i,1); });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
