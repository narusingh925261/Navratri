<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>जय माता दी - नवरात्रि शुभकामनाएँ</title>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Hindi:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle, #ff9933, #cc0000);
            font-family: 'Anek Hindi', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        #fireworks-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .main-container { width: 95%; max-width: 500px; z-index: 10; padding: 10px; text-align: center; }
        .ad-container { margin: 10px 0; display: flex; justify-content: center; background: rgba(255, 255, 255, 0.1); border-radius: 5px; min-height: 60px; }

        /* Card Style */
        .card {
            background: #fffbe6;
            border: 8px ridge #ffd700;
            border-radius: 20px;
            padding: 20px;
            padding-bottom: 70px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            display: none;
            position: relative;
            margin-bottom: 20px;
        }
        .mata-img { width: 100%; border-radius: 10px; border: 3px solid #ff4500; }
        .from-name-top { font-size: 22px; color: #d41414; font-weight: bold; margin-bottom: 10px; }
        .shayari { font-size: 18px; color: #b30000; line-height: 1.4; margin: 15px 0; font-weight: bold; }

        /* Corner Photo */
        .sender-photo-frame { position: absolute; bottom: 10px; right: 15px; text-align: center; }
        .sender-img { width: 75px; height: 75px; border-radius: 50%; border: 3px solid #ff4500; object-fit: cover; background: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
        .sender-name-tag { font-size: 12px; background: #ff4500; color: white; padding: 2px 8px; border-radius: 10px; display: block; margin-top: -10px; position: relative; z-index: 2; }

        /* Setup Box */
        .setup-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); margin-top: 20px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ff9933; border-radius: 8px; }
        .btn { background: linear-gradient(#ff4500, #b30000); color: white; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%; margin-top: 10px; }
        .loading { font-size: 14px; color: #ff4500; display: none; margin-top: 10px; font-weight: bold; }
        
        .whatsapp-btn { background: #25D366; margin-top: 20px; text-decoration: none; display: block; color: white; padding: 12px; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #openBtn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; background: gold; color: red; font-size: 22px; padding: 20px; border-radius: 10px; border: 4px solid red; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px white; }
    </style>
</head>
<body>

    <canvas id="fireworks-canvas"></canvas>

    <audio id="bhajan" loop>
        <source src="mata_bhajan.mp3" type="audio/mpeg">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="main-container">

        <!-- 1. Top Ad -->
        <div class="ad-container">
            <script type="text/javascript">
                atOptions = {'key' : '5ef61b9ce5db99a105f2eab3538cf716','format' : 'iframe','height' : 60,'width' : 468,'params' : {}};
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/5ef61b9ce5db99a105f2eab3538cf716/invoke.js"></script>
        </div>

        <button id="openBtn" onclick="startApp()">🚩 सरप्राइज खोलने के लिए क्लिक करें 🚩</button>

        <!-- Setup Form -->
        <div id="setupBox" class="setup-box" style="display: none;">
            <h2 style="color: #d41414;">अपना नाम और फोटो लगायें</h2>
            <input type="text" id="senderName" placeholder="अपना नाम लिखें...">
            <p style="font-size: 14px; text-align: left; color: #666; margin-top: 10px;">अपनी फोटो अपलोड करें:</p>
            <input type="file" id="senderPhotoInput" accept="image/*">
            <button class="btn" id="genBtn" onclick="uploadAndGenerate()">कार्ड बनायें ✨</button>
            <div id="loader" class="loading">फोटो अपलोड हो रही है, कृपया रुकें... ⏳</div>
        </div>

        <!-- Main Card -->
        <div id="wishCard" class="card">
            <div class="from-name-top">🚩 <span id="viewFrom"></span> की ओर से...</div>

            <img src="mata.gif" alt="Jai Mata Di" class="mata-img" onerror="this.src='https://media.giphy.com/media/3o7TKVUn7iM8FMEU24/giphy.gif'">

            <!-- 2. Middle Ad -->
            <div class="ad-container">
                <script type="text/javascript">
                    atOptions = {'key' : '5ef61b9ce5db99a105f2eab3538cf716','format' : 'iframe','height' : 60,'width' : 468,'params' : {}};
                </script>
                <script type="text/javascript" src="https://www.highperformanceformat.com/5ef61b9ce5db99a105f2eab3538cf716/invoke.js"></script>
            </div>

            <h1 style="color: #ff4500; margin: 10px 0;">शुभ नवरात्रि</h1>
            <p class="shayari">"माता रानी की असीम कृपा आप पर और आपके परिवार पर सदा बनी रहे।"</p>

            <!-- Sender Photo at Bottom Corner -->
            <div class="sender-photo-frame">
                <img src="" id="viewPhoto" class="sender-img">
                <span class="sender-name-tag" id="viewNameTag"></span>
            </div>

            <a href="#" id="waShare" class="whatsapp-btn" onclick="shareWhatsApp()">व्हाट्सएप पर शेयर करें 📱</a>
            <p onclick="location.href=location.pathname" style="margin-top:20px; cursor:pointer; font-size:13px; color:#d41414; font-weight:bold;">अपना खुद का कार्ड बनायें 🛠️</p>
        </div>

        <!-- 3. Bottom Ad -->
        <div class="ad-container">
            <script type="text/javascript">
                atOptions = {'key' : '5ef61b9ce5db99a105f2eab3538cf716','format' : 'iframe','height' : 60,'width' : 468,'params' : {}};
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/5ef61b9ce5db99a105f2eab3538cf716/invoke.js"></script>
        </div>

    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const urlName = params.get('name');
        const urlImg = params.get('img');

        // अगर लिंक से आया है
        if(!urlName) {
            document.getElementById('openBtn').style.display = 'none';
            document.getElementById('setupBox').style.display = 'block';
        }

        function startApp() {
            document.getElementById('openBtn').style.display = 'none';
            document.getElementById('bhajan').play();
            if(urlName) {
                document.getElementById('viewFrom').innerText = urlName;
                document.getElementById('viewNameTag').innerText = urlName;
                if(urlImg) {
                    document.getElementById('viewPhoto').src = urlImg;
                } else {
                    document.getElementById('viewPhoto').style.display = 'none';
                }
                document.getElementById('wishCard').style.display = 'block';
                startFireworks();
            }
        }

        async function uploadAndGenerate() {
            const name = document.getElementById('senderName').value;
            const photoFile = document.getElementById('senderPhotoInput').files[0];
            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');

            if(!name) { alert("कृपया अपना नाम लिखें!"); return; }

            let finalImgUrl = "";

            if(photoFile) {
                btn.disabled = true;
                loader.style.display = 'block';

                // ImgBB API पर फोटो अपलोड करना (Free API)
                const formData = new FormData();
                formData.append("image", photoFile);

                try {
                    // नोट: यहाँ अपनी ImgBB API Key डालें (मुफ्त मिलती है imgbb.com पर)
                    // फिलहाल मैं एक पब्लिक की (Public Key) का उपयोग कर रहा हूँ
                    const response = await fetch("https://api.imgbb.com/1/upload?key=67f620e2e9c1809088427f4d3851082c", {
                        method: "POST",
                        body: formData
                    });
                    const result = await response.json();
                    finalImgUrl = result.data.url;
                } catch (error) {
                    console.error("Upload failed", error);
                    alert("फोटो अपलोड नहीं हो पाई, बिना फोटो के कार्ड बनेगा।");
                }
            }

            // कार्ड दिखाना
            document.getElementById('viewFrom').innerText = name;
            document.getElementById('viewNameTag').innerText = name;
            if(finalImgUrl) {
                document.getElementById('viewPhoto').src = finalImgUrl;
            } else {
                document.getElementById('viewPhoto').style.display = 'none';
            }

            loader.style.display = 'none';
            document.getElementById('setupBox').style.display = 'none';
            document.getElementById('wishCard').style.display = 'block';
            document.getElementById('bhajan').play();
            startFireworks();

            // ग्लोबल वेरिएबल में इमेज सेव करना ताकि शेयर हो सके
            window.uploadedImgUrl = finalImgUrl;
        }

        function shareWhatsApp() {
            const name = document.getElementById('viewFrom').innerText;
            const imgUrl = window.uploadedImgUrl || "";
            const currentPath = window.location.origin + window.location.pathname;
            const shareUrl = `${currentPath}?name=${encodeURIComponent(name)}&img=${encodeURIComponent(imgUrl)}`;
            
            const msg = `🚩 *शुभ नवरात्रि* 🚩\n\n*${name}* ने आपके लिए एक खास सरप्राइज भेजा है।\n\nइसे देखने के लिए नीचे नीले लिंक पर क्लिक करें 👇\n${shareUrl}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // Fireworks Script
        function startFireworks() {
            const canvas = document.getElementById('fireworks-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let particles = [];
            function Particle(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.vx = Math.random() * 4 - 2; this.vy = Math.random() * 4 - 2; this.alpha = 1;
            }
            Particle.prototype.draw = function() {
                ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill();
                this.x += this.vx; this.y += this.vy; this.alpha -= 0.01;
            }
            function animate() {
                ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width, canvas.height);
                if(Math.random() < 0.05) {
                    let x = Math.random()*canvas.width, y = Math.random()*canvas.height;
                    let color = `hsl(${Math.random()*360}, 100%, 50%)`;
                    for(let i=0; i<15; i++) particles.push(new Particle(x,y,color));
                }
                particles.forEach((p,i) => { p.draw(); if(p.alpha<=0) particles.splice(i,1); });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
