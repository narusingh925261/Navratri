<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>शुभ नवरात्रि - माता रानी की कृपा</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Anek+Hindi:wght@400;700&display=swap" rel="stylesheet">
    <!-- html2canvas for Download Feature -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle, #ff9933, #cc0000);
            font-family: 'Anek Hindi', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        #fireworks-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .main-container { width: 95%; max-width: 500px; z-index: 10; padding: 10px; text-align: center; }
        
        /* विज्ञापन बॉक्स */
        .ad-container { margin: 10px 0; display: flex; justify-content: center; background: rgba(255, 255, 255, 0.1); min-height: 60px; overflow: hidden; border-radius: 5px; }

        /* कार्ड का डिजाइन */
        #captureCard {
            background: #fffbe6;
            border: 8px ridge #ffd700;
            border-radius: 20px;
            padding: 20px;
            padding-bottom: 80px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            display: none; 
        }
        .mata-img { width: 100%; border-radius: 10px; border: 3px solid #ff4500; }
        .from-text { font-size: 20px; color: #d41414; font-weight: bold; margin-bottom: 10px; }
        .main-wish { color: #ff4500; font-size: 32px; margin: 10px 0; text-shadow: 1px 1px 2px #000; }
        .shayari { font-size: 17px; color: #b30000; line-height: 1.4; font-weight: bold; margin-bottom: 15px; }

        /* कोने वाली फोटो */
        .sender-box { position: absolute; bottom: 10px; right: 15px; text-align: center; }
        .sender-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #ff4500; object-fit: cover; background: white; }
        .sender-name { font-size: 12px; background: #ff4500; color: white; padding: 2px 10px; border-radius: 10px; display: block; margin-top: -10px; position: relative; }

        /* सेटअप बॉक्स */
        .setup-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); margin-top: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ff9933; border-radius: 8px; }
        .btn { background: linear-gradient(#ff4500, #b30000); color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%; margin-top: 10px; }
        
        /* बटन सेक्शन */
        .action-btns { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; display: none; }
        .whatsapp-btn { background: #25D366; color: white; text-decoration: none; padding: 12px; border-radius: 50px; font-weight: bold; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .download-btn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 50px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .create-own-btn { background: #333; color: #ffd700; border: 2px solid #ffd700; padding: 10px; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 16px; margin-top: 5px; }

        #openBtn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; background: gold; color: red; font-size: 22px; padding: 20px; border-radius: 10px; border: 4px solid red; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px white; }
        .loader { display: none; color: #ff4500; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <canvas id="fireworks-canvas"></canvas>

    <!-- माता जी का भजन -->
    <audio id="bhajan" loop>
        <source src="mata_bhajan.mp3" type="audio/mpeg">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="main-container">

        <!-- 1. Top Banner Ad Slot -->
        <div class="ad-container">
            <script type="text/javascript">
                atOptions = {'key' : '5ef61b9ce5db99a105f2eab3538cf716','format' : 'iframe','height' : 60,'width' : 468,'params' : {}};
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/5ef61b9ce5db99a105f2eab3538cf716/invoke.js"></script>
        </div>

        <!-- Entry Button -->
        <button id="openBtn" onclick="startApp()">🚩 नवरात्रि सरप्राइज खोलें 🚩</button>

        <!-- Setup Box -->
        <div id="setupBox" class="setup-box">
            <h2 style="color: #d41414;">अपना नाम और फोटो लगायें</h2>
            <input type="text" id="userName" placeholder="अपना नाम यहाँ लिखें...">
            <p style="font-size: 12px; text-align: left; margin: 5px 0 0 5px;">अपनी फोटो चुनें:</p>
            <input type="file" id="userImgInput" accept="image/*">
            <button class="btn" id="createBtn" onclick="processCard()">कार्ड बनायें ✨</button>
            <div id="waitMsg" class="loader">फोटो अपलोड हो रही है, कृपया रुकें...</div>
        </div>

        <!-- The Card -->
        <div id="captureCard">
            <div class="from-text">🚩 <span id="displayFromName"></span> की ओर से...</div>
            
            <img src="mata.gif" alt="Mata Rani" class="mata-img" id="mataGif" crossorigin="anonymous" onerror="this.src='https://media.giphy.com/media/3o7TKVUn7iM8FMEU24/giphy.gif'">

            <!-- 2. Middle Banner Ad Slot (Inside Card) -->
            <div class="ad-container">
                <script type="text/javascript">
                    atOptions = {'key' : '5ef61b9ce5db99a105f2eab3538cf716','format' : 'iframe','height' : 60,'width' : 468,'params' : {}};
                </script>
                <script type="text/javascript" src="https://www.highperformanceformat.com/5ef61b9ce5db99a105f2eab3538cf716/invoke.js"></script>
            </div>

            <h1 class="main-wish">शुभ नवरात्रि</h1>
            <p class="shayari">"माँ दुर्गा आपको और आपके परिवार को सुख, समृद्धि और आरोग्य प्रदान करें। जय माता दी!"</p>

            <!-- Corner Photo Frame -->
            <div class="sender-box">
                <img src="" id="displayUserImg" class="sender-img" crossorigin="anonymous">
                <span class="sender-name" id="displayNameTag"></span>
            </div>
        </div>

        <!-- Download, Share and Create Button Section -->
        <div class="action-btns" id="actionPanel">
            <button class="download-btn" onclick="downloadCard()">गैलरी में डाउनलोड करें 📥</button>
            <a href="#" class="whatsapp-btn" onclick="shareToWhatsApp()">व्हाट्सएप पर शेयर करें 📱</a>
            
            <!-- मांगा गया बटन: अपना कार्ड बनायें -->
            <button class="create-own-btn" onclick="location.href=location.pathname">अपना खुद का कार्ड बनायें 🛠️</button>
        </div>

        <!-- 3. Bottom Banner Ad Slot -->
        <div class="ad-container">
            <script type="text/javascript">
                atOptions = {'key' : '5ef61b9ce5db99a105f2eab3538cf716','format' : 'iframe','height' : 60,'width' : 468,'params' : {}};
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/5ef61b9ce5db99a105f2eab3538cf716/invoke.js"></script>
        </div>

    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const savedName = urlParams.get('n');
        const savedImg = urlParams.get('i');

        if(savedName) {
            document.getElementById('setupBox').style.display = 'none';
        } else {
            document.getElementById('openBtn').style.display = 'none';
        }

        function startApp() {
            document.getElementById('openBtn').style.display = 'none';
            document.getElementById('bhajan').play();
            if(savedName) {
                showCard(savedName, savedImg);
            }
        }

        async function processCard() {
            const name = document.getElementById('userName').value;
            const imgFile = document.getElementById('userImgInput').files[0];
            const waitMsg = document.getElementById('waitMsg');
            
            if(!name) { alert("कृपया अपना नाम लिखें!"); return; }
            
            let imgUrl = "";
            if(imgFile) {
                waitMsg.style.display = 'block';
                const formData = new FormData();
                formData.append("image", imgFile);
                
                try {
                    const res = await fetch("https://api.imgbb.com/1/upload?key=67f620e2e9c1809088427f4d3851082c", {
                        method: "POST",
                        body: formData
                    });
                    const data = await res.json();
                    imgUrl = data.data.url;
                } catch (e) { alert("फोटो अपलोड नहीं हो पाई!"); }
            }
            
            waitMsg.style.display = 'none';
            showCard(name, imgUrl);
            window.latestImg = imgUrl; 
        }

        function showCard(name, img) {
            document.getElementById('setupBox').style.display = 'none';
            document.getElementById('captureCard').style.display = 'block';
            document.getElementById('actionPanel').style.display = 'flex';
            document.getElementById('displayFromName').innerText = name;
            document.getElementById('displayNameTag').innerText = name;
            
            const userImgElem = document.getElementById('displayUserImg');
            if(img) {
                userImgElem.src = img;
                userImgElem.style.display = 'block';
            } else {
                userImgElem.style.display = 'none';
            }
            
            document.getElementById('bhajan').play();
            startFireworks();
        }

        function downloadCard() {
            const card = document.getElementById('captureCard');
            // एड्स को डाउनलोड में न दिखाने के लिए छुपाएं
            const ads = document.querySelectorAll('.ad-container');
            ads.forEach(ad => ad.style.display = 'none');

            html2canvas(card, { useCORS: true, backgroundColor: "#fffbe6" }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Navratri_Wish.png`;
                link.href = canvas.toDataURL();
                link.click();
                ads.forEach(ad => ad.style.display = 'flex');
            });
        }

        function shareToWhatsApp() {
            const name = document.getElementById('displayFromName').innerText;
            const img = window.latestImg || savedImg || "";
            const currentUrl = window.location.origin + window.location.pathname;
            const finalLink = `${currentUrl}?n=${encodeURIComponent(name)}&i=${encodeURIComponent(img)}`;
            
            const text = `🚩 *शुभ नवरात्रि* 🚩\n\n*${name}* ने आपके लिए एक खास सरप्राइज भेजा है।\nदेखने के लिए यहाँ क्लिक करें 👇\n${finalLink}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        // Fireworks Script
        function startFireworks() {
            const canvas = document.getElementById('fireworks-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let particles = [];
            function Particle(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.vx = Math.random() * 4 - 2; this.vy = Math.random() * 4 - 2; this.alpha = 1;
            }
            Particle.prototype.draw = function() {
                ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2); ctx.fill();
                this.x += this.vx; this.y += this.vy; this.alpha -= 0.01;
            }
            function animate() {
                ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width, canvas.height);
                if(Math.random() < 0.05) {
                    let x = Math.random()*canvas.width, y = Math.random()*canvas.height;
                    let color = `hsl(${Math.random()*360}, 100%, 50%)`;
                    for(let i=0; i<15; i++) particles.push(new Particle(x,y,color));
                }
                particles.forEach((p,i) => { p.draw(); if(p.alpha<=0) particles.splice(i,1); });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>

    <!-- सोशल बार एड्स कोड यहाँ है (Social Bar Ads Script) -->
    <script src="https://pl28927780.profitablecpmratenetwork.com/a7/6e/b4/a76eb4e64e7550bb4bf787ad5dbaa0b4.js"></script>

</body>
</html>
