<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>जय माता दी - नवरात्रि शुभकामनाएँ</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Anek+Hindi:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            /* धार्मिक बैकग्राउंड: भगवा और लाल का मिश्रण */
            background: radial-gradient(circle, #ff9933, #cc0000);
            font-family: 'Anek Hindi', sans-serif;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #fireworks-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .main-container {
            width: 95%;
            max-width: 500px;
            z-index: 10;
            padding: 20px 10px;
            text-align: center;
        }

        /* कार्ड का डिजाइन */
        .card {
            background: #fffbe6; /* हल्का क्रीम कलर */
            border: 8px ridge #ffd700;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            display: none; /* शुरू में छुपा रहेगा */
            position: relative;
        }

        /* बॉर्डर पर छोटे दीपक/फूल का प्रभाव */
        .card::before {
            content: "🚩";
            position: absolute;
            top: -20px; left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
        }

        .mata-img {
            width: 100%;
            border-radius: 10px;
            border: 3px solid #ff4500;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .to-name {
            font-size: 26px;
            color: #d41414;
            font-weight: bold;
            margin: 15px 0;
            text-transform: capitalize;
        }

        .from-name {
            font-size: 20px;
            color: #333;
            font-weight: bold;
            background: #ffd700;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            margin-bottom: 10px;
        }

        .shayari {
            font-size: 18px;
            color: #b30000;
            line-height: 1.4;
            margin: 15px 0;
            font-weight: bold;
        }

        /* इनपुट फॉर्म */
        .setup-box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-top: 50px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ff9933;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn {
            background: linear-gradient(#ff4500, #b30000);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .whatsapp-btn { background: #25D366; margin-top: 20px; text-decoration: none; display: block; color: white; padding: 12px; border-radius: 50px; font-weight: bold;}
        
        .create-own-btn {
            background: #333;
            color: #fff;
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            display: inline-block;
        }

        /* एंट्री बटन */
        #openBtn {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            background: gold;
            color: red;
            font-size: 24px;
            padding: 20px 40px;
            border-radius: 10px;
            border: 4px solid red;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 20px #fff;
        }
    </style>
</head>
<body>

    <canvas id="fireworks-canvas"></canvas>

    <!-- माता जी का गाना (यहाँ अपनी फाइल का नाम डालें) -->
    <audio id="bhajan" loop>
        <source src="mata_bhajan.mp3" type="audio/mpeg">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="main-container">
        
        <!-- पहली बार खोलने पर दिखने वाला बटन -->
        <button id="openBtn" onclick="startApp()">👉 कार्ड खोलने के लिए यहाँ क्लिक करें 👈</button>

        <!-- सेटअप बॉक्स (नाम डालने के लिए) -->
        <div id="setupBox" class="setup-box" style="display: none;">
            <h2 style="color: #d41414;">नवरात्रि शुभकामना कार्ड बनायें</h2>
            <input type="text" id="senderName" placeholder="अपना नाम लिखें (From)">
            <input type="text" id="receiverName" placeholder="जिसको भेजना है उसका नाम (To)">
            <button class="btn" onclick="generateAndShow()">कार्ड देखें ✨</button>
        </div>

        <!-- मुख्य ग्रीटिंग कार्ड -->
        <div id="wishCard" class="card">
            <div class="from-name">🚩 <span id="viewFrom"></span> की ओर से...</div>
            
            <div class="to-name">प्रिय <span id="viewTo"></span> जी,</div>

            <!-- आपकी GIF फाइल -->
            <img src="mata.gif" alt="Jai Mata Di" class="mata-img" onerror="this.src='https://media.giphy.com/media/3o7TKVUn7iM8FMEU24/giphy.gif'">

            <h1 style="color: #ff4500; margin: 10px 0;">शुभ नवरात्रि</h1>

            <p class="shayari">
                "माँ दुर्गा आपको अपनी नौ भुजाओं से:<br>
                बल, बुद्धि, ऐश्वर्य, सुख, स्वास्थ्य,<br>
                शान्ति, प्रसिद्धि और समृद्धि प्रदान करें।"<br>
                🚩 **जय माता दी** 🚩
            </p>

            <a href="#" id="waShare" class="whatsapp-btn" onclick="shareWhatsApp()">व्हाट्सएप पर दोस्तों को भेजें 📱</a>
            
            <div class="create-own-btn" onclick="location.href=location.pathname">अपना खुद का कार्ड बनायें 🛠️</div>
        </div>
    </div>

    <script>
        // --- URL से नाम पढ़ना ---
        const params = new URLSearchParams(window.location.search);
        const urlTo = params.get('to');
        const urlFrom = params.get('from');

        // अगर लिंक में पहले से नाम हैं, तो सीधा "Open" बटन दिखाओ
        if(!urlTo && !urlFrom) {
            document.getElementById('openBtn').style.display = 'none';
            document.getElementById('setupBox').style.display = 'block';
        }

        function startApp() {
            document.getElementById('openBtn').style.display = 'none';
            document.getElementById('bhajan').play(); // गाना शुरू
            
            if(urlTo) {
                document.getElementById('viewTo').innerText = urlTo;
                document.getElementById('viewFrom').innerText = urlFrom || "एक शुभचिंतक";
                document.getElementById('wishCard').style.display = 'block';
                startFireworks();
            } else {
                document.getElementById('setupBox').style.display = 'block';
            }
        }

        function generateAndShow() {
            const f = document.getElementById('senderName').value;
            const t = document.getElementById('receiverName').value;
            if(!f || !t) { alert("दोनों नाम भरना जरूरी है!"); return; }

            document.getElementById('viewFrom').innerText = f;
            document.getElementById('viewTo').innerText = t;
            document.getElementById('setupBox').style.display = 'none';
            document.getElementById('wishCard').style.display = 'block';
            document.getElementById('bhajan').play();
            startFireworks();
        }

        function shareWhatsApp() {
            const f = document.getElementById('viewFrom').innerText;
            const t = document.getElementById('viewTo').innerText;
            const currentUrl = window.location.origin + window.location.pathname;
            const shareUrl = `${currentUrl}?from=${encodeURIComponent(f)}&to=${encodeURIComponent(t)}`;
            
            const msg = `🚩 *शुभ नवरात्रि* 🚩\n\n*${f}* ने *${t}* के लिए एक बहुत ही सुंदर माता रानी का सरप्राइज भेजा है।\n\nइसे अभी देखने के लिए नीचे नीले लिंक पर क्लिक करें 👇\n\n${shareUrl}`;
            
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // --- आतिशबाजी (Fireworks) Script ---
        function startFireworks() {
            const canvas = document.getElementById('fireworks-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];
            function Particle(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.vx = Math.random() * 6 - 3;
                this.vy = Math.random() * 6 - 3;
                this.alpha = 1;
            }
            Particle.prototype.draw = function() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2); ctx.fill();
                this.x += this.vx; this.y += this.vy; this.alpha -= 0.01;
            }

            function animate() {
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.fillRect(0,0,canvas.width, canvas.height);
                if(Math.random() < 0.1) {
                    let x = Math.random()*canvas.width, y = Math.random()*canvas.height;
                    let color = `hsl(${Math.random()*360}, 100%, 50%)`;
                    for(let i=0; i<20; i++) particles.push(new Particle(x,y,color));
                }
                particles.forEach((p,i) => { 
                    p.draw(); if(p.alpha<=0) particles.splice(i,1);
                });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
